<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Easy FIT</title>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom Style Settings -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            super: '#2563eb',
                            dark: '#0f172a', /* slate-900 */
                            card: '#1e293b', /* slate-800 */
                            light: '#f8fafc', /* slate-50 */
                            accent: '#38bdf8' /* light blue */
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body class="bg-brand-dark text-brand-light font-sans antialiased overflow-hidden select-none">
    
    <!-- App Container where views are loaded -->
    <main id="app-container" class="h-screen w-full relative overflow-y-auto pb-24 safe-area-pb fade-in"></main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 w-full bg-brand-card/90 backdrop-blur-md border-t border-slate-700/50 flex justify-around p-3 z-50 rounded-t-3xl shadow-[0_0_20px_rgba(0,0,0,0.5)] safe-area-pb">
        <button onclick="window.router.navigate('catalog')" class="flex flex-col items-center gap-1 text-slate-400 hover:text-brand-accent transition-colors nav-btn" id="nav-catalog">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
            <span class="text-[10px] font-medium uppercase tracking-wider">Тренування</span>
        </button>
        <button onclick="window.router.navigate('profile')" class="flex flex-col items-center gap-1 text-slate-400 hover:text-brand-accent transition-colors nav-btn" id="nav-profile">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            <span class="text-[10px] font-medium uppercase tracking-wider">Профіль</span>
        </button>
    </nav>

    <!-- Main Module -->
    <script type="module" src="./js/app.js"></script>

</body>
</html>
